<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>高中古文40篇備考索引</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #5d6877;
      --line: #d8dee8;
      --paper: #fbfaf7;
      --panel: #ffffff;
      --accent: #9b3d2e;
      --accent-2: #1d6f68;
      --accent-3: #7a5b18;
      --soft: #f1eee7;
      --shadow: 0 10px 30px rgba(31, 41, 51, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    header {
      padding: 32px clamp(18px, 4vw, 54px) 18px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(90deg, rgba(155, 61, 46, .08), rgba(29, 111, 104, .08)),
        var(--panel);
    }

    .topbar {
      display: flex;
      gap: 18px;
      align-items: end;
      justify-content: space-between;
      max-width: 1180px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 44px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(78px, 1fr));
      gap: 10px;
      min-width: min(340px, 100%);
    }

    .stat {
      padding: 12px 14px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 24px;
      color: var(--accent);
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px clamp(14px, 3vw, 28px) 40px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin: 6px 0 18px;
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 10px 0;
      background: color-mix(in srgb, var(--paper) 92%, transparent);
      backdrop-filter: blur(10px);
    }

    .search {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      font-size: 15px;
      color: var(--ink);
      appearance: none;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 8px 12px;
      font: inherit;
      cursor: pointer;
      touch-action: manipulation;
    }

    button.active {
      border-color: transparent;
      background: var(--accent);
      color: white;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(240px, 330px) 1fr;
      gap: 18px;
      align-items: start;
    }

    .list {
      position: sticky;
      top: 12px;
      max-height: calc(100vh - 24px);
      overflow: auto;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      scrollbar-width: thin;
    }

    .item {
      width: 100%;
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      text-align: left;
      border: 0;
      border-radius: 6px;
      background: transparent;
      padding: 10px;
      align-items: start;
    }

    .item:hover,
    .item.selected {
      background: var(--soft);
      color: var(--ink);
    }

    .num {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #efe4d3;
      color: var(--accent-3);
      font-size: 13px;
      font-weight: 700;
    }

    .item-title {
      display: block;
      font-weight: 700;
      line-height: 1.35;
    }

    .item-meta {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .detail {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .detail-head {
      padding: 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(155, 61, 46, .08), rgba(29, 111, 104, .06));
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: 999px;
      background: #eef6f5;
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 700;
    }

    .badge.core { background: #f7e8e4; color: var(--accent); }
    .badge.old { background: #f4eddb; color: var(--accent-3); }

    h2 {
      margin: 0 0 8px;
      font-size: clamp(25px, 4vw, 40px);
      line-height: 1.2;
      letter-spacing: 0;
    }

    .author {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .detail-body {
      display: grid;
      gap: 16px;
      padding: 20px 24px 26px;
    }

    .reader-section {
      padding: 0 0 14px;
      border-bottom: 1px solid var(--line);
    }

    .reader-section:last-child { border-bottom: 0; padding-bottom: 0; }

    .reader-section summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 42px;
      cursor: pointer;
      color: var(--accent);
      font-weight: 800;
      font-size: 16px;
    }

    .reader-section summary::-webkit-details-marker { display: none; }

    .reader-section summary::after {
      content: "+";
      display: grid;
      place-items: center;
      flex: 0 0 28px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--soft);
      color: var(--accent-3);
      font-size: 18px;
      line-height: 1;
    }

    .reader-section[open] summary::after {
      content: "−";
    }

    .reader-content {
      padding-top: 4px;
    }

    section {
      padding: 0 0 14px;
      border-bottom: 1px solid var(--line);
    }

    section:last-child { border-bottom: 0; padding-bottom: 0; }

    h3 {
      margin: 0 0 8px;
      font-size: 16px;
      color: var(--accent);
      letter-spacing: 0;
    }

    p, li {
      font-size: 15px;
      line-height: 1.75;
    }

    p { margin: 0; }

    ul {
      margin: 0;
      padding-left: 1.2rem;
    }

    .empty {
      padding: 26px;
      text-align: center;
      color: var(--muted);
    }

    footer {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 clamp(14px, 3vw, 28px) 30px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    @media (max-width: 820px) {
      body {
        background: var(--panel);
      }

      header {
        padding: 18px 14px 12px;
      }

      .topbar,
      .controls,
      .layout {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: grid;
        gap: 14px;
        align-items: start;
      }

      h1 {
        font-size: 28px;
      }

      .subtitle {
        font-size: 14px;
        line-height: 1.6;
      }

      .stats {
        grid-template-columns: repeat(3, 1fr);
        min-width: 0;
        gap: 8px;
      }

      .stat {
        padding: 9px 8px;
      }

      .stat strong {
        font-size: 20px;
      }

      main {
        padding: 10px 10px 28px;
      }

      .controls {
        gap: 10px;
        margin: 0 0 10px;
        padding: 10px 0;
      }

      .chips {
        flex-wrap: nowrap;
        justify-content: flex-start;
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: none;
      }

      .chips::-webkit-scrollbar {
        display: none;
      }

      .chips button {
        flex: 0 0 auto;
        min-height: 38px;
        padding: 8px 11px;
        font-size: 14px;
      }

      .list {
        position: static;
        max-height: none;
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(210px, 78vw);
        overflow-x: auto;
        overflow-y: hidden;
        gap: 8px;
        padding: 8px;
        border-radius: 0;
        margin-inline: -10px;
        border-left: 0;
        border-right: 0;
        box-shadow: none;
        scroll-snap-type: x mandatory;
      }

      .item {
        scroll-snap-align: start;
        min-height: 76px;
        border: 1px solid var(--line);
        background: var(--panel);
      }

      .detail {
        border-left: 0;
        border-right: 0;
        border-radius: 0;
        margin-inline: -10px;
        box-shadow: none;
      }

      .detail-head {
        padding: 18px 16px;
      }

      h2 {
        font-size: 26px;
      }

      .detail-body {
        padding: 12px 16px 18px;
        gap: 10px;
      }

      .reader-section {
        padding-bottom: 8px;
      }

      .reader-section summary {
        min-height: 46px;
        position: sticky;
        top: 106px;
        z-index: 5;
        background: var(--panel);
      }

      p, li {
        font-size: 16px;
        line-height: 1.85;
      }

      ul {
        padding-left: 1.1rem;
      }

      footer {
        padding: 0 14px 24px;
      }
    }

    @media (max-width: 430px) {
      .search {
        height: 42px;
        font-size: 16px;
      }

      .badges {
        gap: 6px;
      }

      .badge {
        min-height: 26px;
        font-size: 11px;
      }

      .num {
        width: 28px;
        height: 28px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>高中古文40篇備考索引</h1>
        <p class="subtitle">正式資料以國語文學科中心「古典名篇」前 40 篇為基準。完整原文、重點註釋、白話翻譯、賞析與官方來源頁面已整理到 Google Sheets。</p>
      </div>
      <div class="stats" aria-label="篇目統計">
        <div class="stat"><strong>40</strong><span>古文40篇</span></div>
        <div class="stat"><strong>30</strong><span>重要核心</span></div>
        <div class="stat"><strong>15</strong><span>108課綱</span></div>
      </div>
    </div>
  </header>

  <main>
    <div class="controls">
      <input id="search" class="search" type="search" placeholder="搜尋篇名、作者、朝代、關鍵字" />
      <div class="chips" role="group" aria-label="篩選篇目">
        <button class="active" data-filter="all">全部40篇</button>
        <button data-filter="core30">重要30篇</button>
        <button data-filter="curr15">課綱15篇</button>
      </div>
    </div>

    <div class="layout">
      <nav id="list" class="list" aria-label="篇目清單"></nav>
      <article id="detail" class="detail"></article>
    </div>
  </main>

  <footer>
    正式資料主檔：<a href="https://docs.google.com/spreadsheets/d/11BZATYOd-QuuYzVDZMVY2k-eGd5Z69m7vlb6R80o4Nw/edit" target="_blank" rel="noreferrer">高中古文40篇正式資料庫</a>。篇目以國語文學科中心「古典名篇」前 40 篇為基準。
  </footer>

  <script>
    const works = [
      {id:1,title:"大學首章",author:"《大學》",period:"先秦",tags:[],note:["明明德：發揚人本有的光明德性。","親民：使人民更新，也可解作親近人民。","止於至善：以最高善境作修養終點。"],translation:"全文主旨是說，大學之道在於彰明德性、推己及人，最後達到最完善的境界；方法由格物、致知一路推到修身、齊家、治國、平天下。",appreciation:"篇幅短而層次嚴密，將個人修養與公共秩序連成一條路徑，是儒家政治倫理與讀書方法的核心框架。",keywords:"儒家 修身 齊家 治國 平天下"},
      {id:2,title:"燭之武退秦師",author:"左丘明／《左傳》",period:"先秦",tags:["40","30","15"],note:["退：使退兵。","亡鄭以陪鄰：滅鄭只會增加晉國勢力。","闕秦以利晉：削弱秦而有利於晉。"],translation:"秦晉圍鄭，燭之武夜見秦伯，指出滅鄭只會讓晉國坐大，保留鄭國反而可作秦國東道主；秦伯權衡利害後撤兵。",appreciation:"文章以利害分析取代空泛說理，展現春秋外交辭令的精準與務實。人物年老受命、臨危入敵營，也突出了士人的責任感。",keywords:"外交 左傳 說服 利害分析"},
      {id:3,title:"大同與小康",author:"《禮記》",period:"先秦",tags:["40","30","15"],note:["大道之行：理想政治實現時。","天下為公：公共利益高於私利。","貨惡其棄於地：物資不應浪費。"],translation:"孔子先描述人人互信、資源共享、老幼皆有所養的大同世界，再對照禮制維持秩序的小康社會。",appreciation:"本文用理想與現實的並置，呈現儒家社會藍圖。考點常落在大同、小康的差別，以及禮在現實政治中的功能。",keywords:"禮記 大同 小康 儒家理想"},
      {id:4,title:"孫子選：謀攻",author:"孫武／《孫子》",period:"先秦",tags:["40"],note:["上兵伐謀：最高明的用兵是破壞敵方策略。","不戰而屈人之兵：不開戰而使敵屈服。","知彼知己：掌握雙方條件。"],translation:"孫子主張戰爭的最高境界不是硬打，而是以謀略、外交與全局判斷降低損失；能了解敵我，才有勝算。",appreciation:"本文把軍事提升為策略學，重點在成本、全局與資訊。它常可和外交、管理、競爭題材互相比較。",keywords:"孫子 戰略 謀攻 知己知彼"},
      {id:5,title:"勸學",author:"荀子",period:"先秦",tags:["40","30"],note:["君子曰：提出論點的開端。","青取之於藍：後天學習可超越本質。","鍥而不舍：持續雕刻不停止，比喻堅持。"],translation:"荀子說明學習能改變人、提升人，並用大量譬喻說明積累、專注與持續的重要。",appreciation:"文章特色是譬喻密集且論證節奏明快。它代表荀子重視後天教育與人為努力的思想。",keywords:"荀子 學習 譬喻 積累"},
      {id:6,title:"諫逐客書",author:"李斯",period:"秦",tags:["40","30","15"],note:["逐客：驅逐外來人才。","客何負於秦哉：外客對秦有何罪過。","泰山不讓土壤：能包容才成其大。"],translation:"李斯反對秦王驅逐客卿，列舉外來人才與外物對秦的貢獻，說明兼容並用才是成就霸業之道。",appreciation:"全文鋪排有力，先從歷史功績入手，再轉向用人原則。它是戰國策士型論辯與秦代政治現實的代表。",keywords:"李斯 秦 客卿 包容 用人"},
      {id:7,title:"漁父",author:"屈原／《楚辭》",period:"先秦",tags:["30"],note:["顏色憔悴：面容枯槁。","舉世皆濁我獨清：眾人混濁而自己清白。","滄浪之水：借水清濁談處世。"],translation:"屈原被放逐後遇見漁父，兩人討論清濁與進退。屈原堅守潔身自好，漁父則以順勢自處回應。",appreciation:"本文以對話呈現兩種人生態度：堅貞不屈與通達自適。考題常抓價值衝突，不宜只背成語。",keywords:"屈原 楚辭 清濁 出處進退"},
      {id:8,title:"馮諼客孟嘗君",author:"劉向編／《戰國策》",period:"先秦",tags:["40","30"],note:["客：門客。","市義：用焚券替孟嘗君買得民心。","狡兔三窟：有多重退路才安全。"],translation:"馮諼起初看似無能，後來替孟嘗君經營民心、恢復相位並建立退路，使主人轉危為安。",appreciation:"文章以情節反轉塑造策士形象。馮諼的價值不在眼前小利，而在政治安全與長期布局。",keywords:"戰國策 門客 市義 狡兔三窟"},
      {id:9,title:"過秦論",author:"賈誼",period:"漢",tags:["40"],note:["席卷天下：像捲席般吞併天下。","仁義不施：不行仁政。","攻守之勢異也：取天下與守天下所需條件不同。"],translation:"賈誼回顧秦國由強盛到速亡的過程，指出秦失敗的關鍵在於得天下後仍以暴力統治，不施仁義。",appreciation:"文章氣勢宏大，善用排比與對比。它是漢初政論文的典型，核心在歷史興亡與治道反省。",keywords:"賈誼 秦亡 仁義 政論"},
      {id:10,title:"鴻門宴",author:"司馬遷／《史記》",period:"漢",tags:["40","30","15"],note:["項莊舞劍：表面舞劍，實欲刺劉邦。","秋毫無犯：軍紀嚴明。","豎子不足與謀：責罵不能共商大事的人。"],translation:"劉邦赴鴻門向項羽謝罪，席間殺機四伏，張良、樊噲等人周旋救主，劉邦終得脫身。",appreciation:"《史記》以場面調度與人物對話展現性格：項羽重情而寡斷，劉邦能屈能伸，范增老謀卻失勢。",keywords:"史記 項羽 劉邦 人物性格"},
      {id:11,title:"緹縈救父",author:"班固／《漢書》",period:"漢",tags:[],note:["肉刑：傷害身體的刑罰。","願沒入為官婢：願入官府為奴婢。","改刑：改革刑罰制度。"],translation:"緹縈為救父上書文帝，願以自身受罰換父親免刑，促使朝廷反省肉刑制度。",appreciation:"文章把孝行與制度改革連結，重點不只是親情感人，也在於個案如何推動公共政策改變。",keywords:"漢書 緹縈 孝道 肉刑"},
      {id:12,title:"答夫秦嘉書",author:"徐淑",period:"漢",tags:["40"],note:["秦嘉：徐淑之夫。","書：書信。","纏綿悱惻：情意深厚而哀婉。"],translation:"徐淑回覆丈夫秦嘉，表達久別思念、身體病弱與夫妻相知之情。",appreciation:"作品以女性書信呈現細膩情感，在古代散文中具有罕見的私人聲音，語氣真切克制。",keywords:"徐淑 秦嘉 書信 女性文學"},
      {id:13,title:"登樓賦",author:"王粲",period:"漢魏",tags:["40"],note:["賦：鋪敘抒情的文體。","去國懷鄉：離開故土而思念家鄉。","建安風骨：慷慨悲涼的時代風格。"],translation:"王粲登樓遠望，因亂世漂泊而思鄉，並感嘆自身懷才不遇。",appreciation:"本文借登高遠望展開空間與情緒，景物描寫服務於身世之悲，是建安文學的典型抒情。",keywords:"王粲 登樓賦 建安 思鄉"},
      {id:14,title:"出師表",author:"諸葛亮",period:"三國",tags:["40","30","15"],note:["表：臣下給君主的奏章。","開張聖聽：廣泛聽取意見。","妄自菲薄：過分看輕自己。"],translation:"諸葛亮北伐前上表後主，勸其親賢遠佞、賞罰公正，並陳述自己受託孤之恩而盡忠的決心。",appreciation:"文章情理兼備，前半是治國建議，後半是身世與忠誠。語氣懇切，成為忠臣形象的經典。",keywords:"諸葛亮 忠誠 表 親賢遠佞"},
      {id:15,title:"桃花源記",author:"陶淵明",period:"東晉",tags:["40","30","15"],note:["緣溪行：沿著溪水前行。","阡陌交通：田間小路交錯相通。","無論魏晉：更不必說魏晉。"],translation:"漁人偶入桃花源，見到與世隔絕、安樂自足的村落；離開後再尋，卻不可復得。",appreciation:"桃花源既是亂世避難想像，也是對現實政治的反襯。結尾不可再尋，保留理想與失落的張力。",keywords:"陶淵明 烏托邦 隱逸 桃花源"},
      {id:16,title:"世說新語選",author:"劉義慶",period:"南朝",tags:["40","30"],note:["志人小說：記錄人物言行軼事。","詠絮之才：稱讚女子文才。","魏晉風度：重才情、清談與個性。"],translation:"選文多以短小故事呈現魏晉名士的機智、風雅與性格，如謝道韞詠雪、王子猷雪夜訪友等。",appreciation:"《世說新語》以極省筆法抓人物神韻。讀時要注意一句話如何完成性格速寫。",keywords:"世說新語 魏晉風度 志人小說"},
      {id:17,title:"蘭亭集序",author:"王羲之",period:"東晉",tags:["40","30"],note:["修禊：古代三月水邊祓除不祥的儀式。","曲水流觴：沿曲水飲酒賦詩。","死生亦大矣：生死是大事。"],translation:"王羲之記述蘭亭雅集的景致與宴遊，進而感嘆人生短促、生死不可逃避。",appreciation:"前半清雅流動，後半轉為生命哲思。它不只是書法名作，也是魏晉士人由樂入悲的代表散文。",keywords:"王羲之 蘭亭 生死 書法"},
      {id:18,title:"春夜宴桃李園序",author:"李白",period:"唐",tags:["40"],note:["浮生若夢：人生短暫如夢。","秉燭夜遊：夜間持燭遊樂。","序：宴集詩文前的說明文字。"],translation:"李白在春夜與諸弟宴遊桃李園，感嘆人生短促，因而把握良辰美景、飲酒賦詩。",appreciation:"文章短而飛揚，把及時行樂寫成生命自覺。其豪放不是放縱，而是對短暫人生的熱烈回應。",keywords:"李白 宴遊 人生短暫 序"},
      {id:19,title:"師說",author:"韓愈",period:"唐",tags:["40","30","15"],note:["師者，所以傳道受業解惑也：老師的職責是傳道、授業、解惑。","句讀：文章停頓與讀法。","巫醫樂師百工之人：各類技藝工作者。"],translation:"韓愈批評士大夫恥於從師的風氣，主張有道、有學問者皆可為師，不應受年齡貴賤限制。",appreciation:"本文論點鮮明，層層駁斥流俗。它同時是教育論，也是對門第與虛名的批判。",keywords:"韓愈 古文運動 從師 教育"},
      {id:20,title:"始得西山宴遊記",author:"柳宗元",period:"唐",tags:["40","30"],note:["始得：才真正領會。","斫榛莽：砍除雜木草叢。","心凝形釋：心神凝定，形體束縛消解。"],translation:"柳宗元被貶永州後遊山水，登西山才感到精神開闊，從自然中得到超越憂患的體驗。",appreciation:"文章由遊記進入心境轉化。西山不是普通景點，而是作者受貶後重新安頓自我的象徵。",keywords:"柳宗元 永州 西山 山水遊記"},
      {id:21,title:"阿房宮賦",author:"杜牧",period:"唐",tags:[],note:["覆壓三百餘里：形容宮殿廣大。","楚人一炬：項羽焚燒阿房宮。","後人哀之而不鑑之：只哀嘆而不引以為戒。"],translation:"杜牧鋪寫阿房宮的奢華與秦統治者的驕奢，最後警告後世若不借鑑秦亡，也會重蹈覆轍。",appreciation:"本文辭采華麗但目的嚴肅，以極度鋪張的描寫反襯政治警戒。考點常在賦體與諷諫。",keywords:"杜牧 阿房宮 秦亡 賦"},
      {id:22,title:"虯髯客傳",author:"杜光庭",period:"唐",tags:["40","30","15"],note:["虯髯：卷曲的鬍鬚。","風塵三俠：李靖、紅拂女、虯髯客。","識人：辨識英雄氣度。"],translation:"紅拂女夜奔李靖，虯髯客與二人相遇後，認出李世民有帝王之相，轉而遠走成就另一番事業。",appreciation:"唐傳奇兼具英雄想像與命運觀。人物豪俠、女性主動、情節戲劇化，是小說化文言的重要代表。",keywords:"唐傳奇 虯髯客 紅拂女 風塵三俠"},
      {id:23,title:"岳陽樓記",author:"范仲淹",period:"宋",tags:["40","30"],note:["政通人和：政治順利，人民和樂。","不以物喜，不以己悲：不因外物或個人遭遇而喜悲。","先天下之憂而憂：先為天下憂慮。"],translation:"范仲淹借岳陽樓景色描寫遷客騷人的悲喜，提出古仁人超越個人得失、以天下為念的胸懷。",appreciation:"景、情、理結構清楚，最後名句把遊記提升為士人政治倫理。備考要抓住對比與轉折。",keywords:"范仲淹 岳陽樓 士人胸懷"},
      {id:24,title:"醉翁亭記",author:"歐陽脩",period:"宋",tags:["40","30"],note:["醉翁之意不在酒：真正用意不在飲酒。","山水之樂：欣賞自然的樂趣。","與民同樂：和百姓共享安樂。"],translation:"歐陽脩描寫滁州山水、四時風物與遊宴之樂，表面寫醉翁，實則寫太守與民同樂的政治理想。",appreciation:"文句迴環流暢，層層寫樂。它把山水、宴飲、政治治理融為一體，呈現宋代散文的平易與深厚。",keywords:"歐陽脩 醉翁亭 與民同樂"},
      {id:25,title:"訓儉示康",author:"司馬光",period:"宋",tags:["40"],note:["訓：教誨。","儉：節制用度。","示康：寫給兒子司馬康看。"],translation:"司馬光以家訓形式告誡兒子崇尚節儉，說明奢侈會敗德敗家，節用才能立身持家。",appreciation:"文章語氣樸實，重在倫理勸戒。可與〈廉恥〉等文比較士人如何把私德視為公共秩序基礎。",keywords:"司馬光 家訓 節儉"},
      {id:26,title:"六國論",author:"蘇洵",period:"宋",tags:[],note:["弊在賂秦：弊病在於割地賄賂秦國。","抱薪救火：方法錯誤，只會使禍害更大。","為國者無使為積威之所劫：治國者不可被長期威勢脅迫。"],translation:"蘇洵分析六國滅亡，認為割地求安助長秦勢，真正的失敗在於畏懼強敵而喪失抵抗意志。",appreciation:"文章借古諷今，表面論戰國，實則關切宋代對外政策。論證集中，警語有力。",keywords:"蘇洵 六國 賂秦 借古諷今"},
      {id:27,title:"赤壁賦",author:"蘇軾",period:"宋",tags:["40","30","15"],note:["壬戌之秋：宋神宗元豐五年秋。","客有吹洞簫者：同遊者吹簫。","取之無禁，用之不竭：自然之美可共享不盡。"],translation:"蘇軾夜遊赤壁，與客由歷史興亡談到人生短暫，最後以自然長存與心境轉化化解悲感。",appreciation:"本文兼具賦、散文與哲理對話。它的核心不是逃避苦難，而是在有限人生中重新理解自由。",keywords:"蘇軾 赤壁 豁達 哲理"},
      {id:28,title:"上樞密韓太尉書",author:"蘇轍",period:"宋",tags:["40"],note:["樞密韓太尉：韓琦，宋代重臣。","養氣：涵養文章與人格氣象。","文者氣之所形：文章是氣的外在呈現。"],translation:"蘇轍寫信給韓琦，說明自己遠遊求見賢人，是為開闊胸襟、涵養文章氣象。",appreciation:"本文把寫作能力與人生閱歷連起來，強調文章不是技巧堆疊，而是見識、人格與氣度的呈現。",keywords:"蘇轍 養氣 寫作 見識"},
      {id:29,title:"郁離子選",author:"劉基",period:"明",tags:["30"],note:["寓言體：借故事寄託道理。","郁離子：劉基寓言集。","諷喻：用故事委婉批評現實。"],translation:"〈郁離子〉多以短篇寓言說明治國、識人、處世之理，常借動物、人物故事映照政治弊病。",appreciation:"其價值在於以小故事承載政治智慧。讀此類文本要先拆故事表層，再抓隱含批判。",keywords:"劉基 郁離子 寓言 諷喻"},
      {id:30,title:"指喻",author:"方孝孺",period:"明",tags:["40"],note:["指：手指。","喻：譬喻說理。","防微杜漸：在小問題時及早防止。"],translation:"作者借手指小病若不早治，終將危及全身，說明人事與國政也應及早除患。",appreciation:"文章以日常身體經驗作政治與人生譬喻，短小明確。核心在小患不可輕忽。",keywords:"方孝孺 指喻 防微杜漸"},
      {id:31,title:"項脊軒志",author:"歸有光",period:"明",tags:["40","30","15"],note:["項脊軒：作者書齋名。","庭階寂寂：庭院台階寂靜。","瞻顧遺跡：看著舊物追憶往事。"],translation:"歸有光記述項脊軒的修葺與家族往事，追憶祖母、母親、妻子，平淡敘事中蘊含深情。",appreciation:"本文以細節取勝，不直接哭訴，卻讓舊物、動作與空間承載哀思，是明代小品文名篇。",keywords:"歸有光 項脊軒 親情 細節"},
      {id:32,title:"西湖七月半",author:"張岱",period:"明清",tags:[],note:["七月半：中元節前後。","看月者：賞月之人。","冷眼旁觀：以旁觀姿態觀察世情。"],translation:"張岱寫七月半西湖遊人百態，表面寫賞月，實際分辨俗客與雅士的不同心態。",appreciation:"文字幽默而有觀察力，擅長用人群分類呈現世俗風景。它也是晚明小品審美的代表。",keywords:"張岱 西湖 小品 世情"},
      {id:33,title:"原君",author:"黃宗羲",period:"明清",tags:["40","30"],note:["原：推究本源。","君為天下之大害：批判君主專制。","天下為主，君為客：政治應以天下人民為本。"],translation:"黃宗羲追問君主制度本質，批判君主把天下視為私產，主張君主應服務天下。",appreciation:"本文思想尖銳，具有早期民本與反專制色彩。考題常與儒家民本、明清思想轉向連結。",keywords:"黃宗羲 明夷待訪錄 民本 反專制"},
      {id:34,title:"廉恥",author:"顧炎武",period:"明清",tags:["40","30"],note:["廉：不貪。","恥：知羞惡。","士大夫之無恥，是謂國恥：士人失德會成為國家羞恥。"],translation:"顧炎武指出廉恥是維繫人格與國家的根本，士人若喪失羞恥心，國家也會敗壞。",appreciation:"文章把個人品格提升為國家興亡問題，反映明清之際士人對道德與政治責任的沉痛反省。",keywords:"顧炎武 廉恥 士人 責任"},
      {id:35,title:"大鐵椎傳",author:"魏禧",period:"明清",tags:[],note:["鐵椎：鐵製大槌。","傳：記人物事蹟的文體。","俠：重義氣、有膽識的人物類型。"],translation:"作者記述一位持大鐵椎的奇人，透過其行動與氣概描寫民間豪俠形象。",appreciation:"本文筆法簡潔，人物神秘而有力量。它保留明清散文中的俠義想像與傳奇色彩。",keywords:"魏禧 大鐵椎 俠義 傳記"},
      {id:36,title:"左忠毅公逸事",author:"方苞",period:"清",tags:["40","30"],note:["左忠毅公：左光斗。","逸事：散佚不常見的事蹟。","桐城派：清代重義法的散文流派。"],translation:"方苞記述左光斗識拔史可法、入獄仍關懷國事的事蹟，彰顯忠義與師生傳承。",appreciation:"文章以幾個關鍵場景塑造人物精神，含蓄沉著，符合桐城派重法度與義理的散文特色。",keywords:"方苞 左光斗 史可法 忠義"},
      {id:37,title:"東番記",author:"陳第",period:"明",tags:["40"],note:["東番：早期對臺灣原住民地區的稱呼。","記：記述見聞。","風土書寫：記錄地理、民俗與生活。"],translation:"陳第記錄早期臺灣地理與原住民生活風俗，呈現外來文人對島嶼社會的觀察。",appreciation:"本文具臺灣史料價值。閱讀時要同時注意其觀察內容與外來者視角可能帶有的限制。",keywords:"陳第 東番記 台灣 風土"},
      {id:38,title:"紀水沙連",author:"藍鼎元",period:"清",tags:["40"],note:["水沙連：今南投日月潭一帶。","紀：記錄。","邊地書寫：對地方山川民情的記述。"],translation:"藍鼎元記錄水沙連一帶的山川形勢、交通與族群風俗，留下清代臺灣內山印象。",appreciation:"文章兼具地理紀錄與治理視角，是理解清代臺灣開發、邊地認識與族群接觸的重要文本。",keywords:"藍鼎元 水沙連 日月潭 台灣"},
      {id:39,title:"裨海紀遊選",author:"郁永河",period:"清",tags:["30"],note:["裨海：小海，指臺灣周邊海域。","北投硫穴：臺灣硫磺產地。","紀遊：遊歷記錄。"],translation:"郁永河渡海來臺採硫，記錄沿途風土、海上經驗與北臺灣地景。",appreciation:"作品兼有旅行文學與地方志價值。它讓臺灣自然景觀進入古典散文視野。",keywords:"郁永河 裨海紀遊 台灣 採硫"},
      {id:40,title:"臺灣通史序",author:"連橫",period:"近代臺灣",tags:["40","30"],note:["通史：貫通古今的歷史。","序：說明寫作緣起與宗旨。","民族記憶：以歷史保存共同身分。"],translation:"連橫說明撰寫《臺灣通史》的動機，強調臺灣歷史不可湮沒，應保存文獻與民族記憶。",appreciation:"本文在近代殖民處境中凸顯書寫歷史的意義。它不只是序文，也是文化保存與身分認同宣言。",keywords:"連橫 臺灣通史 歷史記憶 台灣"}
    ];

    const extra15 = new Set(["晚遊六橋待月記","勞山道士","勸和論","鹿港乘桴記","畫菊自序"]);
    const extraWorks = [
      {id:41,title:"晚遊六橋待月記",author:"袁宏道",period:"明",tags:["40","30","15"],note:["六橋：杭州西湖蘇堤六橋。","待月：等待月出。","公安派：主張性靈、反對模擬。"],translation:"袁宏道描寫西湖晚遊，避開日間喧囂，等待月色中的湖光山色，呈現獨到審美。",appreciation:"文章重在性靈與感受，不追求宏大議論。它展現晚明小品清新、靈動、重個人感官的特色。",keywords:"袁宏道 西湖 性靈 小品"},
      {id:42,title:"勞山道士",author:"蒲松齡／《聊齋誌異》",period:"清",tags:["40","30","15"],note:["勞山：山名。","穿牆術：道士示現的法術。","志怪小說：記奇異故事的小說。"],translation:"王生求道只想速成法術，學得穿牆術後自滿回家，結果撞牆出醜，暴露貪巧與浮躁。",appreciation:"故事以奇幻包裝諷刺，批判不願下功夫卻只求捷徑的人性。備考可抓小說結構與寓意。",keywords:"蒲松齡 聊齋 勞山道士 諷刺"},
      {id:43,title:"勸和論",author:"鄭用錫",period:"清代臺灣",tags:["30","15"],note:["勸和：勸止械鬥、促成和解。","分類械鬥：清代臺灣族群或籍貫衝突。","論：議論文體。"],translation:"鄭用錫針對臺灣社會械鬥問題，勸民眾停止仇殺，以共同利益、倫理與地方安定為重。",appreciation:"本文有明確臺灣社會史背景，把古文議論落到地方治理與民間衝突，是108課綱本土素材重點。",keywords:"鄭用錫 勸和論 台灣 本土 械鬥"},
      {id:44,title:"鹿港乘桴記",author:"洪棄生",period:"近代臺灣",tags:["15"],note:["乘桴：乘小筏，引申為出行漂泊。","鹿港：臺灣中部古港。","乙未後：可連結割臺後士人心境。"],translation:"洪棄生記鹿港所見與乘桴經驗，文字中寄寓時代變局下的地方感懷與身世之思。",appreciation:"本文可視為近代臺灣文人面對歷史變動的書寫。重點在地景、身分與時代情緒交織。",keywords:"洪棄生 鹿港 近代台灣 地景"},
      {id:45,title:"畫菊自序",author:"張李德和",period:"近代臺灣",tags:["15"],note:["自序：作者為自己作品所寫的序。","畫菊：以菊花寄託人格與審美。","女性書寫：108課綱納入的重要多元面向。"],translation:"張李德和借畫菊說明創作心境，將菊花的清雅堅貞與自我修養、藝術追求相連。",appreciation:"作品兼具女性文學、臺灣古典文學與藝術題材。讀法宜注意作者如何以物寫志。",keywords:"張李德和 畫菊 女性文學 台灣"},
      {id:46,title:"先秦韻文選",author:"《詩經》／屈原",period:"先秦",tags:["40"],note:["蒹葭：取自《詩經》，以秋水伊人寫追尋。","漁父：取自《楚辭》，以清濁問答談處世。","韻文：重聲律節奏與抒情。"],translation:"此組選文以〈蒹葭〉的追尋意象與〈漁父〉的出處進退，呈現先秦韻文的抒情和思想深度。",appreciation:"一篇偏朦朧情境，一篇偏價值辯證；合讀可看見先秦文學從民歌意象到士人精神抉擇的跨度。",keywords:"詩經 楚辭 蒹葭 漁父 韻文"},
      {id:47,title:"典論論文",author:"曹丕",period:"魏晉",tags:["40","30"],note:["文章經國之大業：文章關乎治國與不朽。","不朽之盛事：文章可超越生命限制。","文氣：作者才性氣質表現在文章中。"],translation:"曹丕評論文章價值與作家才性，認為寫作不只是技藝，而是能流傳後世的重要事業。",appreciation:"這是中國文學批評史上的重要文本，把文學提升為獨立價值，也開啟以才性論文的傳統。",keywords:"曹丕 文學批評 文氣 建安"},
      {id:48,title:"與陳伯之書",author:"丘遲",period:"南朝",tags:["30"],note:["書：書信文體。","暮春三月，江南草長：以江南春景動人。","迷途知返：勸人回頭。"],translation:"丘遲寫信勸降陳伯之，以故國情感、江南景色與利害分析，使對方重新思考立場。",appreciation:"本文把抒情景語與政治勸說結合，柔中帶剛，是書信體論辯的佳例。",keywords:"丘遲 書信 勸降 江南"},
      {id:49,title:"諫太宗十思疏",author:"魏徵",period:"唐",tags:["30"],note:["疏：臣下分條陳述意見的奏議。","居安思危：安定時要想到危險。","十思：十項君主自我警惕。"],translation:"魏徵勸唐太宗在盛世中保持警醒，從節欲、納諫、慎賞罰等方面避免由治入亂。",appreciation:"全文以水能載舟亦能覆舟的政治意識為底，展現諫臣對權力的約束與盛世危機感。",keywords:"魏徵 唐太宗 納諫 居安思危"},
      {id:50,title:"傷仲永",author:"王安石",period:"宋",tags:["40"],note:["傷：哀惜。","仲永：方仲永，幼年有才。","泯然眾人矣：完全變成普通人。"],translation:"方仲永幼年天資過人，因父親只帶他四處求利、不讓他學習，最後才華消失。",appreciation:"文章用天才隕落說明後天教育的重要，可與〈勸學〉對讀，都是反對只靠天資的文本。",keywords:"王安石 傷仲永 教育 天資"},
      {id:51,title:"夢溪筆談選",author:"沈括",period:"宋",tags:["40"],note:["筆談：隨筆記錄見聞。","正午牡丹：由畫中花影判斷時間。","格物精神：觀察事物、推求原理。"],translation:"選文記錄沈括對自然、技術與日常現象的觀察，展現以經驗推理理解世界的方法。",appreciation:"它讓古文不只限於抒情議論，也包含科學觀察與知識筆記，適合素養題跨域閱讀。",keywords:"沈括 夢溪筆談 科學觀察 筆記"},
      {id:52,title:"賣柑者言",author:"劉基",period:"明",tags:["40"],note:["金玉其外，敗絮其中：外表華美，內在敗壞。","賣柑者：借小販之口諷世。","寓言諷刺：以故事批評現實。"],translation:"作者借買到外美內壞的柑橘，引出賣柑者對世上表裡不一者的諷刺。",appreciation:"文章短小辛辣，將生活交易轉成政治社會批判，成語也常成為考點。",keywords:"劉基 賣柑者言 諷刺 表裡不一"},
      {id:53,title:"病梅館記",author:"龔自珍",period:"清",tags:["40"],note:["病梅：被人工扭曲成病態美的梅。","斫直、刪密、鋤正：破壞自然生長。","托物言志：借物表達政治與人才觀。"],translation:"龔自珍寫人們為追求畸形審美而摧殘梅樹，藉此批判壓抑人才與扭曲個性的制度。",appreciation:"本文以梅喻人，表面談園藝，實則批判專制文化對生命力的傷害，象徵性很強。",keywords:"龔自珍 病梅館記 人才 托物言志"},
      {id:54,title:"北投硫穴記",author:"郁永河",period:"清代臺灣",tags:["40"],note:["硫穴：硫磺產地。","北投：臺北北投一帶。","採硫：清代臺灣重要物產活動。"],translation:"郁永河記錄北投硫磺地景與採硫經驗，呈現早期臺灣自然資源與旅行見聞。",appreciation:"此文具地方史與自然書寫價值，可與〈裨海紀遊選〉合讀，看臺灣如何被納入古典散文版圖。",keywords:"郁永河 北投 硫磺 台灣"}
    ];

    const displayWorks = works.concat(extraWorks);
    const core15Titles = new Set(displayWorks.filter(w => w.tags.includes("15")).map(w => w.title));
    const core30Titles = new Set(displayWorks.filter(w => w.tags.includes("30")).map(w => w.title));

    let filter = "all";
    let selectedId = 2;
    const listEl = document.querySelector("#list");
    const detailEl = document.querySelector("#detail");
    const searchEl = document.querySelector("#search");

    function visibleWorks() {
      const q = searchEl.value.trim().toLowerCase();
      return displayWorks.filter(work => {
        const inFilter = filter === "all"
          ? work.tags.includes("40")
          : filter === "core30"
            ? core30Titles.has(work.title)
            : core15Titles.has(work.title);
        const haystack = `${work.title} ${work.author} ${work.period} ${work.keywords}`.toLowerCase();
        return inFilter && (!q || haystack.includes(q));
      });
    }

    function renderList() {
      const rows = visibleWorks();
      if (!rows.length) {
        listEl.innerHTML = `<div class="empty">找不到符合條件的篇目</div>`;
        detailEl.innerHTML = `<div class="empty">請調整搜尋或篩選條件。</div>`;
        return;
      }
      if (!rows.some(w => w.id === selectedId)) selectedId = rows[0].id;
      listEl.innerHTML = rows.map((work, index) => `
        <button class="item ${work.id === selectedId ? "selected" : ""}" data-id="${work.id}">
          <span class="num">${index + 1}</span>
          <span>
            <span class="item-title">${work.title}</span>
            <span class="item-meta">${work.period}｜${work.author}</span>
          </span>
        </button>
      `).join("");
      renderDetail();
    }

    function renderDetail() {
      const work = displayWorks.find(w => w.id === selectedId) || visibleWorks()[0];
      const badges = [
        work.tags.includes("40") ? `<span class="badge old">95暫綱40篇</span>` : "",
        core30Titles.has(work.title) ? `<span class="badge">重要30篇</span>` : "",
        core15Titles.has(work.title) ? `<span class="badge core">108課綱15篇</span>` : ""
      ].join("");
      detailEl.innerHTML = `
        <div class="detail-head">
          <div class="badges">${badges}</div>
          <h2>${work.title}</h2>
          <p class="author">${work.period}｜${work.author}</p>
        </div>
        <div class="detail-body">
          <section>
            <h3>原文</h3>
            <p>${work.original || "完整原文與校訂狀態請見 Google Sheets「原文」欄；本頁會依資料表內容接續同步。"}</p>
          </section>
          <section>
            <h3>註釋</h3>
            <ul>${work.note.map(x => `<li>${x}</li>`).join("")}</ul>
          </section>
          <section>
            <h3>翻譯重點</h3>
            <p>${work.translation}</p>
          </section>
          <section>
            <h3>賞析</h3>
            <p>${work.appreciation}</p>
          </section>
          <section>
            <h3>備考關鍵字</h3>
            <p>${work.keywords}</p>
          </section>
        </div>
      `;
    }

    renderList = function() {
      const rows = visibleWorks();
      if (!rows.length) {
        listEl.innerHTML = `<div class="empty">找不到符合條件的篇目</div>`;
        detailEl.innerHTML = `<div class="empty">請調整搜尋或篩選條件。</div>`;
        return;
      }
      if (!rows.some(w => w.id === selectedId)) selectedId = rows[0].id;
      listEl.innerHTML = rows.map((work, index) => `
        <button class="item ${work.id === selectedId ? "selected" : ""}" data-id="${work.id}">
          <span class="num">${index + 1}</span>
          <span>
            <span class="item-title">${work.title}</span>
            <span class="item-meta">${work.period}｜${work.author}</span>
          </span>
        </button>
      `).join("");
      renderDetail();
    };

    function readerBlock(title, htmlContent, open = true) {
      return `
        <details class="reader-section" ${open ? "open" : ""}>
          <summary>${title}</summary>
          <div class="reader-content">${htmlContent}</div>
        </details>
      `;
    }

    renderDetail = function() {
      const work = displayWorks.find(w => w.id === selectedId) || visibleWorks()[0];
      const badges = [
        work.tags.includes("40") ? `<span class="badge old">官方/40篇</span>` : "",
        core30Titles.has(work.title) ? `<span class="badge">重要30篇</span>` : "",
        core15Titles.has(work.title) ? `<span class="badge core">108課綱15篇</span>` : ""
      ].join("");
      const sourceText = work.original || "完整原文、校訂狀態與延伸分類請見 Google Sheets 正式資料庫。";
      const noteList = Array.isArray(work.note) ? work.note.map(x => `<li>${x}</li>`).join("") : "";
      detailEl.innerHTML = `
        <div class="detail-head">
          <div class="badges">${badges}</div>
          <h2>${work.title}</h2>
          <p class="author">${work.period}｜${work.author}</p>
        </div>
        <div class="detail-body">
          ${readerBlock("原文", `<p>${sourceText}</p>`, true)}
          ${readerBlock("重點註釋", `<ul>${noteList}</ul>`, true)}
          ${readerBlock("白話翻譯", `<p>${work.translation}</p>`, true)}
          ${readerBlock("賞析與考點", `<p>${work.appreciation}</p>`, true)}
          ${readerBlock("備考關鍵字", `<p>${work.keywords}</p>`, false)}
        </div>
      `;
    };

    listEl.addEventListener("click", event => {
      const button = event.target.closest("button[data-id]");
      if (!button) return;
      selectedId = Number(button.dataset.id);
      renderList();
      if (matchMedia("(max-width: 820px)").matches) {
        detailEl.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    });

    document.querySelectorAll("[data-filter]").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll("[data-filter]").forEach(b => b.classList.remove("active"));
        button.classList.add("active");
        filter = button.dataset.filter;
        renderList();
      });
    });

    document.title = "高中古文40篇行動複習";
    document.querySelector("h1").textContent = "高中古文40篇行動複習";
    document.querySelector(".subtitle").textContent =
      "正式資料以國語文學科中心古典名篇前40篇為基準。完整原文、重點註釋、白話翻譯、賞析與官方來源頁面已整理到 Google Sheets。";
    searchEl.placeholder = "搜尋篇名、作者、朝代、關鍵字";
    document.querySelector('[data-filter="all"]').textContent = "全部40篇";
    document.querySelector('[data-filter="core30"]').textContent = "重要30篇";
    document.querySelector('[data-filter="curr15"]').textContent = "課綱15篇";
    const statLabels = document.querySelectorAll(".stat span");
    if (statLabels.length >= 3) {
      statLabels[0].textContent = "官方40篇";
      statLabels[1].textContent = "重要核心";
      statLabels[2].textContent = "108課綱";
    }

    searchEl.addEventListener("input", renderList);
    renderList();
  </script>
</body>
</html>
